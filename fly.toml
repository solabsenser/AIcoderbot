# fly.toml app configuration file generated for aicoderbot on 2026-03-09T11:07:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aicoderbot'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
